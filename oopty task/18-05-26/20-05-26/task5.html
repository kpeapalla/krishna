<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfileCard</title>
    <link rel="Stylesheet" href="task5.css">
</head>

<body>
    <div class="krishna">
        <div class="kri">
            <img src="https://cdn.britannica.com/42/223142-050-7033F421/Red-ant-on-a-green-branch.jpg" height="200"
                width="200" alt="Ant Image">

        </div>
        <div class="content">
            <h1>Morgan Sweeney</h1>
            <div class="job">Ant Collector</div>

            <div class="followers">
                <div>
                    <h2>12</h2>
                    <p>Followers</p>
                </div>

                <div>
                    <h3>1000</h3>
                    <p>Following</p>
                </div>
            </div>

            <button>Follow</button>

            <div class="description">
                <p>Morgan has collected ants since they were six years old
                    and now has many dozen ants but none in their pants.
                </p>
            </div>
        </div>



    </div>
</body>



</html>
