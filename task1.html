<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <link rel="Stylesheet" href="task1.css">
  <title>Place an Order</title>

</head>
<body>

    <div class="container">
    <div class="title">Place an Order</div>

    <div class="form-box">
      <div class="heading">Billing Address</div>

      <form>
        
        <div class="form-group">
          <label>First name</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>Last name</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>Street Address</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>City</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>State</label>
          <select>
            <option>AP</option>
            <option>TG</option>
            <option>KA</option>
            <option>TN</option>
          </select>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
