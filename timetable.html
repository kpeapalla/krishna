<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Transport Schedule</h2>

            <table border="1" cellpadding="10">
                <thead>
                    <tr>
                        <th rowspan="2">Transport</th>
                        <th colspan="2">Timing</th>
                        <th rowspan="2">Fare</th>
                    </tr>

                    <tr>
                        <th>Morning</th>
                        <th>Evening</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Metro</td>
                        <td>6:00 AM</td>
                        <td>10:00 PM</td>
                        <td>₹50</td>
                    </tr>

                    <tr>
                        <td>Bus</td>
                        <td>5:00 AM</td>
                        <td>11:00 PM</td>
                        <td>₹20</td>
                    </tr>
                </tbody>

                <tfoot>
                    <tr>
                        <td colspan="4">
                            Transport timings may vary on holidays.
                        </td>
                    </tr>
                </tfoot>
            </table>

            <hr>
        </section>
    
</body>
</html>
